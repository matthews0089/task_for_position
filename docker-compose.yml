services:
  tempail-api:
    build: .
    container_name: tempail-api
    environment:
      APP_ENV: ${APP_ENV:-docker}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TEMPAIL_URL: ${TEMPAIL_URL:-https://tempail.com/ua/}
      BROWSER_HEADLESS: ${BROWSER_HEADLESS:-true}
      PAGE_LOAD_TIMEOUT: ${PAGE_LOAD_TIMEOUT:-30000}
      ACTION_TIMEOUT: ${ACTION_TIMEOUT:-10000}
      INBOX_POLL_INTERVAL: ${INBOX_POLL_INTERVAL:-2.0}
      RETRY_ATTEMPTS: ${RETRY_ATTEMPTS:-3}
      RETRY_DELAY_SECONDS: ${RETRY_DELAY_SECONDS:-0.75}
    ports:
      - "8000:8000"
    restart: unless-stopped
